<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="700" viewBox="0 0 1600 700">
  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1600" height="700" fill="#1a1a1a"/>
  <!-- School building shapes -->
  <rect x="200" y="250" width="300" height="350" fill="#2a2a2a" rx="4" filter="url(#blur)"/>
  <rect x="250" y="200" width="200" height="50" fill="#333" rx="2"/>
  <rect x="550" y="180" width="500" height="420" fill="#252525" rx="4" filter="url(#blur)"/>
  <rect x="650" y="140" width="300" height="40" fill="#333" rx="2"/>
  <rect x="1100" y="280" width="280" height="320" fill="#2a2a2a" rx="4" filter="url(#blur)"/>
  <!-- Windows -->
  <rect x="270" y="300" width="50" height="60" fill="#3a3a3a" rx="2"/>
  <rect x="370" y="300" width="50" height="60" fill="#3a3a3a" rx="2"/>
  <rect x="270" y="400" width="50" height="60" fill="#3a3a3a" rx="2"/>
  <rect x="370" y="400" width="50" height="60" fill="#3a3a3a" rx="2"/>
  <rect x="620" y="240" width="60" height="70" fill="#3a3a3a" rx="2"/>
  <rect x="720" y="240" width="60" height="70" fill="#3a3a3a" rx="2"/>
  <rect x="820" y="240" width="60" height="70" fill="#3a3a3a" rx="2"/>
  <rect x="920" y="240" width="60" height="70" fill="#3a3a3a" rx="2"/>
  <rect x="620" y="360" width="60" height="70" fill="#3a3a3a" rx="2"/>
  <rect x="720" y="360" width="60" height="70" fill="#3a3a3a" rx="2"/>
  <rect x="820" y="360" width="60" height="70" fill="#3a3a3a" rx="2"/>
  <rect x="920" y="360" width="60" height="70" fill="#3a3a3a" rx="2"/>
  <!-- Trees -->
  <circle cx="120" cy="480" r="50" fill="#2d2d2d"/>
  <rect x="115" y="530" width="10" height="70" fill="#222"/>
  <circle cx="1450" cy="460" r="60" fill="#2d2d2d"/>
  <rect x="1445" y="520" width="10" height="80" fill="#222"/>
  <!-- Ground -->
  <rect x="0" y="600" width="1600" height="100" fill="#222"/>
</svg>